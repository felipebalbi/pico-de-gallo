# cargo-deny configuration
#
# Run locally with: cargo deny check
# CI runs the same via .github/workflows/check.yml.

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# -- Advisories ---------------------------------------------------------------
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# Every entry here needs a justification comment AND a removal trigger.
# When in doubt, prefer fixing the underlying dep over adding an ignore.
ignore = [
    # atomic-polyfill is unmaintained (deprecated by upstream in favor of
    # portable-atomic). Reaches us transitively via heapless 0.7 -> postcard
    # 1.x -> postcard-rpc 0.12. There is no safe upgrade until postcard
    # migrates to heapless 0.8 (which uses portable-atomic). Re-evaluate
    # whenever postcard-rpc bumps its postcard/heapless majors.
    "RUSTSEC-2023-0089",
    # proc-macro-error is unmaintained (maintainer unreachable). Reaches us
    # only as a compile-time dev-dep through bilge-impl -> bilge ->
    # is31fl3743b-driver (used by pico-de-gallo-hal tests). Not in shipped
    # binaries. Re-evaluate when bilge migrates to proc-macro-error2 (or
    # when is31fl3743b-driver drops bilge).
    "RUSTSEC-2024-0370",
    # bare-metal is deprecated in favor of critical-section. Reaches us
    # transitively via cortex-m 0.7, which is depended on by essentially
    # every embassy-rp / embassy-executor / panic-probe / rp-pac crate in
    # the firmware. Re-evaluate when the cortex-m 0.7 ecosystem migrates
    # off bare-metal (cortex-m 0.8 / embassy bumps).
    "RUSTSEC-2026-0110",
    # paste is unmaintained (archived by upstream). Reaches us only as a
    # compile-time proc-macro through pio-core -> pio -> embassy-rp (and
    # pio-proc / pio-parser). Not in shipped firmware binaries.
    # Re-evaluate when embassy-rp's pio stack migrates to pastey.
    "RUSTSEC-2024-0436",
    # proc-macro-error2 is unmaintained (upstream confirmed and recommends
    # migrating away). It was originally created as a maintained fork of
    # proc-macro-error (RUSTSEC-2024-0370); both are now unmaintained.
    # Reaches us only as a compile-time proc-macro dep through tabled ->
    # tabled_derive (used by the gallo CLI for table rendering). Not in
    # shipped binaries. Re-evaluate when tabled_derive migrates to
    # manyhow / proc-macro2-diagnostics, or when we drop tabled.
    "RUSTSEC-2026-0173",
]

# -- Licenses -----------------------------------------------------------------
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "0BSD",
]
confidence-threshold = 0.93

# -- Bans ---------------------------------------------------------------------
# This is the section that would have prevented the embassy-usb-driver 0.2.1
# regression: it bans multiple copies of the same crate in the dep graph,
# which is exactly what happens when a transitive dep silently bumps a
# semver-incompatible inner dep (embedded-io-async 0.6 -> 0.7).
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Crates that are intentionally allowed to appear multiple times (e.g.
# because two upstream releases depend on different majors and we cannot
# unify). Add entries here with a justification comment.
skip = []
skip-tree = []

# Hard deny-list — never allowed in the dep tree.
deny = []

# -- Sources ------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
