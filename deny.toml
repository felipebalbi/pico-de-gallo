# cargo-deny configuration
#
# Run locally with: cargo deny check
# CI runs the same via .github/workflows/check.yml.

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# -- Advisories ---------------------------------------------------------------
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

# -- Licenses -----------------------------------------------------------------
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "0BSD",
]
confidence-threshold = 0.93

# -- Bans ---------------------------------------------------------------------
# This is the section that would have prevented the embassy-usb-driver 0.2.1
# regression: it bans multiple copies of the same crate in the dep graph,
# which is exactly what happens when a transitive dep silently bumps a
# semver-incompatible inner dep (embedded-io-async 0.6 -> 0.7).
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Crates that are intentionally allowed to appear multiple times (e.g.
# because two upstream releases depend on different majors and we cannot
# unify). Add entries here with a justification comment.
skip = []
skip-tree = []

# Hard deny-list — never allowed in the dep tree.
deny = []

# -- Sources ------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
