# This workflow runs whenever a PR is opened or updated, or a commit is pushed to main. It runs
# several checks:
# - fmt: checks that the code is formatted according to rustfmt
# - clippy: checks that the code does not contain any clippy warnings
# - doc: checks that the code can be documented without errors
# - hack: check combinations of feature flags
# - msrv: check that the msrv specified in the crate is correct
permissions:
  contents: read
# This configuration allows maintainers of this repo to create a branch and pull request based on
# the new branch. Restricting the push trigger to the main branch ensures that the PR only gets
# built once.
on:
  push:
    branches: [main]
  pull_request:
# If new code is pushed to a PR branch, then cancel in progress workflows for that PR. Ensures that
# we don't waste CI time, and returns results quicker https://github.com/jonhoo/rust-ci-conf/pull/5
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

name: check
jobs:
  fmt:
    strategy:
      fail-fast: false
      matrix:
        # Get early warning of new lints which are regularly introduced in beta channels.
        toolchain: [stable, beta]
        crate: [pico-de-gallo-app, pico-de-gallo-firmware,
        pico-de-gallo-internal, pico-de-gallo-ffi, pico-de-gallo-hal,
        pico-de-gallo-lib, pyco-de-gallo]

    runs-on: ubuntu-latest

    name: stable / fmt

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --check
        working-directory: crates/${{ matrix.crate }}

  clippy:
    runs-on: ubuntu-latest

    name: ${{ matrix.toolchain }} / clippy

    permissions:
      contents: read
      checks: write

    strategy:
      fail-fast: false
      matrix:
        # Get early warning of new lints which are regularly introduced in beta channels.
        toolchain: [stable, beta]
        crate: [pico-de-gallo-app, pico-de-gallo-internal,
        pico-de-gallo-ffi, pico-de-gallo-hal, pico-de-gallo-lib,
        pyco-de-gallo]

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Install ${{ matrix.toolchain }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy

      - name: cargo clippy
        working-directory: crates/${{ matrix.crate }}
        run: cargo clippy --all-targets -- -D warnings

  # Wire-protocol crate is published; cargo-semver-checks catches accidental
  # API breakage in PRs against pico-de-gallo-internal.
  semver:
    runs-on: ubuntu-latest
    name: stable / semver
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
      - name: cargo-semver-checks
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: pico-de-gallo-internal
          manifest-path: Cargo.toml

  doc:
    # run docs generation on nightly rather than stable. This enables features like
    # https://doc.rust-lang.org/beta/unstable-book/language-features/doc-cfg.html which allows an
    # API be documented as only available in some specific platforms.
    runs-on: ubuntu-latest

    name: nightly / doc

    strategy:
      matrix:
        crate: [pico-de-gallo-app, pico-de-gallo-internal,
        pico-de-gallo-ffi, pico-de-gallo-hal, pico-de-gallo-lib,
        pyco-de-gallo]

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Install nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: cargo doc
        run: cargo doc --no-deps --all-features
        working-directory: crates/${{ matrix.crate }}
        env:
          RUSTDOCFLAGS: --cfg docsrs

  hack:
    # cargo-hack checks combinations of feature flags to ensure that features are all additive
    # which is required for feature unification
    runs-on: ubuntu-latest

    name: ubuntu / stable / features

    strategy:
      matrix:
        crate: [pico-de-gallo-app, pico-de-gallo-internal,
        pico-de-gallo-ffi, pico-de-gallo-hal, pico-de-gallo-lib,
        pyco-de-gallo]

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Install stable
        uses: dtolnay/rust-toolchain@stable

      - name: cargo install cargo-hack
        uses: taiki-e/install-action@cargo-hack

      # intentionally no target specifier; see https://github.com/jonhoo/rust-ci-conf/pull/4
      # --feature-powerset runs for every combination of features
      - name: cargo hack
        run: cargo hack --feature-powerset check
        working-directory: crates/${{ matrix.crate }}

  test:
    runs-on: ubuntu-latest

    name: ubuntu / stable / test

    strategy:
      matrix:
        crate: [pico-de-gallo-internal, pico-de-gallo-ffi,
        pico-de-gallo-hal, pico-de-gallo-lib, pico-de-gallo-app,
        pyco-de-gallo]

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Install stable
        uses: dtolnay/rust-toolchain@stable

      - name: cargo test
        run: cargo test
        working-directory: crates/${{ matrix.crate }}

  msrv:
    # check that we can build using the minimal rust version that is specified by this crate
    runs-on: ubuntu-latest

    # we use a matrix here just because env can't be used in job names
    # https://docs.github.com/en/actions/learn-github-actions/contexts#context-availability
    strategy:
      fail-fast: false

      matrix:
        msrv: ["1.90"]
        crate: [pico-de-gallo-app, pico-de-gallo-internal,
        pico-de-gallo-ffi, pico-de-gallo-hal, pico-de-gallo-lib,
        pyco-de-gallo]

    name: ubuntu / ${{ matrix.msrv }}

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Install ${{ matrix.msrv }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.msrv }}

      - name: cargo +${{ matrix.msrv }} check
        run: cargo check
        working-directory: crates/${{ matrix.crate }}

  lockfile:
    # Verify that the committed Cargo.lock is consistent with Cargo.toml.
    # Fails if a contributor edited a Cargo.toml dependency without
    # regenerating the lockfile, which would otherwise only surface as a
    # release-day surprise (cf. embassy-usb-driver 0.2.1 transitive break).
    runs-on: ubuntu-latest

    name: ubuntu / stable / lockfile

    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: .
            extra-flags: ""
          - workspace: crates/pico-de-gallo-firmware
            extra-flags: "--target thumbv8m.main-none-eabihf"

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Install stable
        uses: dtolnay/rust-toolchain@stable

      - name: rustup target add thumbv8m.main-none-eabihf
        if: matrix.workspace == 'crates/pico-de-gallo-firmware'
        run: rustup target add thumbv8m.main-none-eabihf

      - name: cargo check --locked
        working-directory: ${{ matrix.workspace }}
        run: cargo check --locked ${{ matrix.extra-flags }}

  actionlint:
    # Lint every workflow in .github/workflows/. Catches typos, missing
    # runs-on, bad matrix syntax. Cheap insurance against CI breakage
    # introduced by workflow edits.
    runs-on: ubuntu-latest

    name: ubuntu / actionlint

    steps:
      - uses: actions/checkout@v7

      - name: actionlint
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color

  deny:
    # cargo-deny enforces the dependency policy in deny.toml: no yanked
    # crates, license allow-list, no unknown registries, and (most
    # importantly) warns on duplicate copies of a crate in the dep graph.
    # Duplicate copies are exactly the failure mode that produced the
    # embassy-usb-driver 0.2.1 regression (two embedded-io-async majors).
    runs-on: ubuntu-latest

    name: ubuntu / cargo-deny

    strategy:
      fail-fast: false
      matrix:
        workspace: [., crates/pico-de-gallo-firmware]

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: ${{ matrix.workspace }}/Cargo.toml
          arguments: --all-features
          command: check bans licenses sources advisories
