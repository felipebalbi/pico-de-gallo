# This workflow checks whether the firmware compiles for the no_std embedded
# target.  Because the firmware uses mutually exclusive hw-rev1 / hw-rev2
# feature flags, cargo-hack's --feature-powerset cannot be used here.
# Instead we test each revision explicitly.
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: no-std
jobs:
  nostd:
    runs-on: ubuntu-latest
    name: ${{ matrix.target }} / ${{ matrix.hw-rev }}
    strategy:
      fail-fast: false
      matrix:
        target: [thumbv8m.main-none-eabihf]
        hw-rev: [hw-rev1, hw-rev2]
        include:
          - hw-rev: hw-rev1
            feature-flags: ""
          - hw-rev: hw-rev2
            feature-flags: "--no-default-features --features hw-rev2"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: rustup target add ${{ matrix.target }}
        run: rustup target add ${{ matrix.target }}
      - name: cargo check
        run: cargo check --target ${{ matrix.target }} ${{ matrix.feature-flags }} --manifest-path crates/pico-de-gallo-firmware/Cargo.toml
      - name: cargo clippy
        run: cargo clippy --target ${{ matrix.target }} ${{ matrix.feature-flags }} --manifest-path crates/pico-de-gallo-firmware/Cargo.toml -- -D warnings
