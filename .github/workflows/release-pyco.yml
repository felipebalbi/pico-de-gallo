name: Release pyco-de-gallo Python wheels

on:
  push:
    tags:
      - "pyco-v*"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: crates/pyco-de-gallo

env:
  # Python interpreters we want wheels for, on every supported platform.
  # cibuildwheel-style identifiers are also used by maturin via --find-interpreter.
  PYTHON_VERSIONS: "3.8 3.9 3.10 3.11 3.12 3.13 3.14"

jobs:
  # ---------------------------------------------------------------------------
  # Linux (manylinux + musllinux), x86_64 and aarch64
  # ---------------------------------------------------------------------------
  linux:
    name: Build wheels (linux ${{ matrix.target }} ${{ matrix.libc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
        libc: [manylinux, musllinux]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python interpreters
        uses: actions/setup-python@v5
        with:
          python-version: |
            3.8
            3.9
            3.10
            3.11
            3.12
            3.13
            3.14
          allow-prereleases: true

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.libc == 'manylinux' && 'auto' || 'musllinux_1_2' }}
          working-directory: crates/pyco-de-gallo
          args: --release --out dist --find-interpreter

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.libc }}-${{ matrix.target }}
          path: crates/pyco-de-gallo/dist

  # ---------------------------------------------------------------------------
  # Windows, x64 and x86
  # ---------------------------------------------------------------------------
  windows:
    name: Build wheels (windows ${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x64, x86]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python interpreters
        uses: actions/setup-python@v5
        with:
          python-version: |
            3.8
            3.9
            3.10
            3.11
            3.12
            3.13
            3.14
          architecture: ${{ matrix.target }}
          allow-prereleases: true

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          working-directory: crates/pyco-de-gallo
          args: --release --out dist --find-interpreter

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: crates/pyco-de-gallo/dist

  # ---------------------------------------------------------------------------
  # macOS, x86_64 and arm64
  # ---------------------------------------------------------------------------
  macos:
    name: Build wheels (macos ${{ matrix.target }})
    runs-on: ${{ matrix.target == 'aarch64' && 'macos-14' || 'macos-13' }}
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python interpreters
        uses: actions/setup-python@v5
        with:
          python-version: |
            3.8
            3.9
            3.10
            3.11
            3.12
            3.13
            3.14
          allow-prereleases: true

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          working-directory: crates/pyco-de-gallo
          args: --release --out dist --find-interpreter

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: crates/pyco-de-gallo/dist

  # ---------------------------------------------------------------------------
  # Source distribution (sdist) — one tarball, platform-independent.
  # ---------------------------------------------------------------------------
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          working-directory: crates/pyco-de-gallo
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: crates/pyco-de-gallo/dist

  # ---------------------------------------------------------------------------
  # Attach all built artifacts to a GitHub Release.
  # Only runs on tag pushes (not workflow_dispatch).
  #
  # NOTE: PyPI publishing is intentionally disabled for now. To enable it,
  # uncomment the `id-token: write` permission and the "Publish to PyPI" step
  # at the bottom of this job. Trusted publishing requires configuring the
  # publisher on PyPI under the project's "Publishing" settings (workflow:
  # release-pyco.yml, environment: leave blank). To use an API token instead,
  # drop `id-token: write` and pass `password: ${{ secrets.PYPI_API_TOKEN }}`
  # to the maturin upload step.
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [linux, windows, macos, sdist]
    if: startsWith(github.ref, 'refs/tags/pyco-v')
    permissions:
      contents: write
      # Required for PyPI trusted publishing (OIDC). Uncomment when enabling
      # the "Publish to PyPI" step below.
      # id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: List built artifacts
        run: ls -lah dist
        working-directory: ${{ github.workspace }}

      - name: Create GitHub Release
        uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          prefix: "pyco"

      - name: Attach wheels and sdist to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          token: ${{ secrets.GITHUB_TOKEN }}

      # - name: Publish to PyPI
      #   uses: PyO3/maturin-action@v1
      #   with:
      #     command: upload
      #     # `--non-interactive` prevents maturin from prompting for credentials.
      #     # With `id-token: write` above, maturin uses PyPI trusted publishing
      #     # automatically.
      #     args: --non-interactive --skip-existing dist/*
