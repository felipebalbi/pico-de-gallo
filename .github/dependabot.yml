version: 2

# Dependabot configuration.
#
# Pre-1.0 we let the wire-protocol-critical crates (internal, lib, hal,
# ffi, application, pyco, firmware) drive their own bumps via release-please
# and Conventional Commits; Dependabot here only updates *transitive*
# Cargo.lock entries and our GitHub Actions pins, which is exactly the
# class of update that surprised us on the embassy-usb-driver 0.2.1 break.
#
# Lockfile-only updates land as boring weekly PRs that CI's lockfile-guard
# job validates end-to-end before review.

updates:
  - package-ecosystem: cargo
    directory: /crates
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: "chore(deps)"
      include: scope

  - package-ecosystem: cargo
    directory: /crates/pico-de-gallo-firmware
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
      - firmware
    commit-message:
      prefix: "chore(deps,firmware)"
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
      include: scope

  - package-ecosystem: pip
    directory: /crates/pyco-de-gallo
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "chore(deps,pyco)"
      include: scope
